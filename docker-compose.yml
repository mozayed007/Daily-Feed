version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DAILYFEED_LLM_PROVIDER=gemini
      - DAILYFEED_OLLAMA_URL=http://host.docker.internal:11434
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-4-31b-it}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - FIREWORKS_MODEL=${FIREWORKS_MODEL:-accounts/fireworks/routers/kimi-k2p6-turbo}
      - FIREWORKS_BASE_URL=${FIREWORKS_BASE_URL:-https://api.fireworks.ai/inference/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
